<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="description" content="KAVI - Voice AI Assistant">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
  <title>KAVI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>KAVI</h1>
      <div class="header-controls">
        <button id="soundToggle" class="icon-btn" aria-label="Toggle sound">
          <svg id="soundOn" viewBox="0 0 24 24" width="24" height="24">
            <path d="M3 9v6h4l5 5V4L7 9H3Zm13.5 3A4.5 4.5 0 0 0 14 8.5v7a4.49 4.49 0 0 0 2.5-3.5Zm2.5 0A7.5 7.5 0 0 0 14 5.5v2a5.5 5.5 0 0 1 0 9v2a7.5 7.5 0 0 0 5-6.5Z" fill="currentColor"/>
          </svg>
          <svg id="soundOff" viewBox="0 0 24 24" width="24" height="24" style="display:none">
            <path d="M3 9v6h4l5 5V4L7 9H3Zm13 3 2.3-2.3 1.4 1.4L17.4 13.4l2.3 2.3-1.4 1.4L16 14.8l-2.3 2.3-1.4-1.4 2.3-2.3-2.3-2.3 1.4-1.4L16 11.2l2.3-2.3 1.4 1.4L17.4 12Z" fill="currentColor"/>
          </svg>
        </button>
        <button id="resetBtn" class="icon-btn" aria-label="Reset conversation">
          <svg viewBox="0 0 24 24" width="22" height="22">
            <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8Z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <main id="chatContainer">
      <div id="messages"></div>
    </main>

    <div id="statusBar">
      <span id="statusText">Tap to speak</span>
    </div>

    <footer>
      <div class="input-row">
        <input type="text" id="textInput" placeholder="Type a message..." autocomplete="off">
        <button id="sendBtn" class="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" width="22" height="22">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <button id="micBtn" class="mic-btn" aria-label="Press to speak">
        <svg viewBox="0 0 24 24" width="32" height="32">
          <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11h-2Z" fill="currentColor"/>
        </svg>
      </button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
